<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRE Execute Flow (Session Keys)</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --line: #334155;
        --accent: #22d3ee;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1f2937, var(--bg));
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .card {
        background: linear-gradient(180deg, #0b1220, var(--panel));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      label {
        display: flex;
        flex-direction: column;
        font-size: 12px;
        color: var(--muted);
        gap: 6px;
      }
      input,
      textarea {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0b1020;
        color: var(--text);
        padding: 10px;
        font-size: 13px;
      }
      textarea {
        min-height: 140px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: #00212a;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #020617;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>CRE Policy + Execute (Session Key UI)</h1>
        <p>Connect wallet, create one signed session grant, then reuse session key for requests.</p>
        <div class="row" style="margin-top: 10px">
          <button id="connectBtn" type="button">Connect Wallet</button>
          <button id="createSessionBtn" type="button">Create Session</button>
          <button id="signPermitBtn" type="button">Sign Permit</button>
          <button id="revokeSessionBtn" type="button">Revoke Session</button>
          <span id="walletStatus" class="status">Wallet: not connected</span>
        </div>
      </div>

      <div class="card grid">
        <label>CRE HTTP Trigger URL
          <input id="creTriggerUrl" value="https://YOUR_CRE_HTTP_TRIGGER_URL" />
        </label>
        <label>CRE Execute Trigger URL
          <input id="creExecuteTriggerUrl" value="https://YOUR_CRE_EXECUTE_TRIGGER_URL" />
        </label>
        <label>CRE Session Revoke Trigger URL
          <input id="creRevokeTriggerUrl" value="https://YOUR_CRE_REVOKE_TRIGGER_URL" />
        </label>
        <label>Chain ID
          <input id="chainId" type="number" value="84532" />
        </label>
        <label>Action
          <input id="action" value="swapYesForNo" />
        </label>
        <label>Amount (USDC 6dp as integer string)
          <input id="amountUsdc" value="1000000" />
        </label>
        <label>Permit Token Address
          <input id="permitToken" value="0x0000000000000000000000000000000000000000" />
        </label>
        <label>Permit Spender Address
          <input id="permitSpender" value="0x0000000000000000000000000000000000000000" />
        </label>
        <label>Permit Domain Name
          <input id="permitDomainName" value="YES" />
        </label>
        <label>Permit Domain Version
          <input id="permitDomainVersion" value="1" />
        </label>
        <label>Permit Deadline (unix sec)
          <input id="permitDeadline" value="" placeholder="optional; auto set if empty" />
        </label>
        <label>Session Max Amount (USDC 6dp)
          <input id="sessionMaxAmountUsdc" value="10000000" />
        </label>
        <label>Session Duration (seconds)
          <input id="sessionDurationSec" type="number" value="3600" />
        </label>
        <label>Session Key Password
          <input id="sessionPassword" type="password" value="" placeholder="at least 8 chars; never sent to server" />
        </label>
        <label>Session Allowed Actions (comma separated)
          <input id="sessionAllowedActions" value="swapYesForNo,swapNoForYes,addLiquidity,removeLiquidity" />
        </label>
        <label>Slippage (bps)
          <input id="slippageBps" type="number" value="150" />
        </label>
        <label>Report ActionType (for CRE execute mode)
          <input id="reportActionType" value="createMarket" />
        </label>
        <label>Report PayloadHex (bytes, pre-encoded)
          <input id="reportPayloadHex" value="0x" />
        </label>
        <label>Report Receiver (optional)
          <input id="reportReceiver" value="" placeholder="0xMarketFactoryOrReceiver" />
        </label>
      </div>

      <div class="card">
        <label>Session JSON
          <textarea id="session">
{
  "sessionId": "",
  "owner": "0x1111111111111111111111111111111111111111",
  "sessionPublicKey": "0x04...",
  "chainId": 84532,
  "allowedActions": ["swapYesForNo"],
  "maxAmountUsdc": "10000000",
  "expiresAtUnix": 0,
  "grantSignature": "0x...",
  "requestNonce": "",
  "requestSignature": "0x"
}
          </textarea>
        </label>
      </div>

      <div class="card">
        <label>Permit JSON
          <textarea id="permit">
{
  "token": "0x0000000000000000000000000000000000000000",
  "owner": "0x1111111111111111111111111111111111111111",
  "spender": "0x2222222222222222222222222222222222222222",
  "value": "1000000",
  "nonce": "0",
  "deadline": "1893456000",
  "signature": "0x...",
  "domainName": "YES",
  "domainVersion": "1"
}
          </textarea>
        </label>
      </div>

      <div class="card">
        <label>UserOp JSON
          <textarea id="userOp">
{
  "sender": "0x1111111111111111111111111111111111111111",
  "nonce": "0x1",
  "callData": "0x1234",
  "signature": "0x1234"
}
          </textarea>
        </label>
        <div style="margin-top: 10px">
          <button id="sendBtn">Request Sponsorship</button>
        </div>
      </div>

      <div class="card">
        <pre id="output">Waiting...</pre>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.4/dist/ethers.umd.min.js"></script>
    <script>
      const byId = (id) => document.getElementById(id);
      const output = byId("output");
      const walletStatus = byId("walletStatus");
      const HEX_ADDRESS_REGEX = /^0x[a-fA-F0-9]{40}$/;
      const HEX_BYTES_REGEX = /^0x([a-fA-F0-9]{2})*$/;
      const NONCE_REGEX = /^[a-zA-Z0-9_-]{8,80}$/;
      const NONCES_SELECTOR = "0x7ecebe00";
      const EIP712_NAME = "CRE Session Authorization";
      const EIP712_VERSION = "1";
      let connectedAccount = "";

      const setWalletStatus = (text) => {
        walletStatus.textContent = text;
      };

      const randomHex = (bytesLen) => {
        const bytes = new Uint8Array(bytesLen);
        crypto.getRandomValues(bytes);
        return Array.from(bytes, (x) => x.toString(16).padStart(2, "0")).join("");
      };

      const randomNonce = () => `nonce_${randomHex(12)}`;
      const SESSION_KEY_DB_NAME = "cre_session_key_db";
      const SESSION_KEY_STORE = "session_keys";
      const SESSION_KEY_ITERATIONS = 250000;
      const storageKey = (sessionId) => `cre_session_pk_${sessionId}`;

      const normalizeActions = (actions) => {
        return [...actions].map((x) => String(x).trim()).filter(Boolean).sort();
      };

      const eip712Domain = (chainId) => ({
        name: EIP712_NAME,
        version: EIP712_VERSION,
        chainId,
      });

      const sessionGrantTypes = {
        SessionGrant: [
          { name: "sessionId", type: "string" },
          { name: "owner", type: "address" },
          { name: "sessionPublicKey", type: "bytes" },
          { name: "chainId", type: "uint256" },
          { name: "allowedActionsHash", type: "bytes32" },
          { name: "maxAmountUsdc", type: "uint256" },
          { name: "expiresAtUnix", type: "uint256" },
        ],
      };

      const sponsorIntentTypes = {
        SponsorIntent: [
          { name: "requestId", type: "string" },
          { name: "sessionId", type: "string" },
          { name: "requestNonce", type: "string" },
          { name: "chainId", type: "uint256" },
          { name: "action", type: "string" },
          { name: "amountUsdc", type: "uint256" },
          { name: "slippageBps", type: "uint256" },
          { name: "sender", type: "address" },
          { name: "callData", type: "bytes" },
        ],
      };

      const sessionRevokeTypes = {
        SessionRevoke: [
          { name: "sessionId", type: "string" },
          { name: "owner", type: "address" },
          { name: "chainId", type: "uint256" },
        ],
      };

      const hashAllowedActions = (actions) => {
        const serialized = normalizeActions(actions).join(",");
        return ethers.keccak256(ethers.toUtf8Bytes(serialized));
      };

      const leftPad64 = (hexNoPrefix) => hexNoPrefix.padStart(64, "0");

      const readPermitNonce = async (token, owner) => {
        const callData = `${NONCES_SELECTOR}${leftPad64(owner.slice(2).toLowerCase())}`;
        const result = await window.ethereum.request({
          method: "eth_call",
          params: [{ to: token, data: callData }, "latest"],
        });
        return BigInt(result).toString();
      };

      const bytesToBase64 = (bytes) => {
        let binary = "";
        for (const byte of bytes) binary += String.fromCharCode(byte);
        return btoa(binary);
      };

      const base64ToBytes = (b64) => {
        const binary = atob(b64);
        const out = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
        return out;
      };

      const openSessionKeyDb = () =>
        new Promise((resolve, reject) => {
          const req = indexedDB.open(SESSION_KEY_DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(SESSION_KEY_STORE)) {
              db.createObjectStore(SESSION_KEY_STORE, { keyPath: "id" });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error || new Error("failed to open session key db"));
        });

      const idbPut = async (id, value) => {
        const db = await openSessionKeyDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(SESSION_KEY_STORE, "readwrite");
          tx.objectStore(SESSION_KEY_STORE).put({ id, ...value });
          tx.oncomplete = () => resolve(undefined);
          tx.onerror = () => reject(tx.error || new Error("idb put failed"));
        });
        db.close();
      };

      const idbGet = async (id) => {
        const db = await openSessionKeyDb();
        const result = await new Promise((resolve, reject) => {
          const tx = db.transaction(SESSION_KEY_STORE, "readonly");
          const req = tx.objectStore(SESSION_KEY_STORE).get(id);
          req.onsuccess = () => resolve(req.result || null);
          req.onerror = () => reject(req.error || new Error("idb get failed"));
        });
        db.close();
        return result;
      };

      const idbDelete = async (id) => {
        const db = await openSessionKeyDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(SESSION_KEY_STORE, "readwrite");
          tx.objectStore(SESSION_KEY_STORE).delete(id);
          tx.oncomplete = () => resolve(undefined);
          tx.onerror = () => reject(tx.error || new Error("idb delete failed"));
        });
        db.close();
      };

      const deriveAesKey = async (password, saltBytes) => {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: saltBytes,
            iterations: SESSION_KEY_ITERATIONS,
            hash: "SHA-256",
          },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"]
        );
      };

      const encryptPrivateKey = async (privateKey, password) => {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveAesKey(password, salt);
        const plain = new TextEncoder().encode(privateKey);
        const cipherBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, plain);
        return {
          kdf: "PBKDF2-SHA256",
          iterations: SESSION_KEY_ITERATIONS,
          saltB64: bytesToBase64(salt),
          ivB64: bytesToBase64(iv),
          cipherB64: bytesToBase64(new Uint8Array(cipherBuffer)),
          createdAtUnix: Math.floor(Date.now() / 1000),
        };
      };

      const decryptPrivateKey = async (record, password) => {
        if (!record || typeof record !== "object") throw new Error("missing encrypted key record");
        if (record.kdf !== "PBKDF2-SHA256") throw new Error("unsupported key encryption format");
        const salt = base64ToBytes(record.saltB64 || "");
        const iv = base64ToBytes(record.ivB64 || "");
        const cipher = base64ToBytes(record.cipherB64 || "");
        const key = await deriveAesKey(password, salt);
        let plain;
        try {
          plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
        } catch {
          throw new Error("wrong session password or corrupted key");
        }
        const privateKey = new TextDecoder().decode(plain);
        if (!/^0x[a-fA-F0-9]{64}$/.test(privateKey)) throw new Error("decrypted key is invalid");
        return privateKey;
      };

      const connectWallet = async () => {
        if (!window.ethereum) throw new Error("No injected wallet found (window.ethereum missing)");
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        const account = Array.isArray(accounts) && accounts[0] ? String(accounts[0]) : "";
        if (!HEX_ADDRESS_REGEX.test(account)) throw new Error("Wallet did not return a valid account");
        connectedAccount = account;
        setWalletStatus(`Wallet: ${account}`);
        return account;
      };

      const parseUserOp = () => {
        const userOp = JSON.parse(byId("userOp").value);
        if (!HEX_ADDRESS_REGEX.test(userOp?.sender || "")) throw new Error("Invalid userOp.sender");
        if (!HEX_BYTES_REGEX.test(userOp?.callData || "")) throw new Error("Invalid userOp.callData");
        if (!HEX_BYTES_REGEX.test(userOp?.signature || "") || userOp.signature === "0x") {
          throw new Error("Invalid userOp.signature");
        }
        return userOp;
      };

      const createSession = async () => {
        const account = connectedAccount || (await connectWallet());
        const chainId = Number(byId("chainId").value);
        const maxAmountUsdc = byId("sessionMaxAmountUsdc").value.trim();
        const sessionDurationSec = Number(byId("sessionDurationSec").value);
        const allowedActions = byId("sessionAllowedActions")
          .value.split(",")
          .map((x) => x.trim())
          .filter(Boolean);

        if (!Number.isInteger(chainId) || chainId <= 0) throw new Error("Invalid chainId");
        if (!/^\d+$/.test(maxAmountUsdc) || BigInt(maxAmountUsdc) <= 0n) {
          throw new Error("sessionMaxAmountUsdc must be a positive integer string");
        }
        if (!Number.isInteger(sessionDurationSec) || sessionDurationSec <= 0) {
          throw new Error("sessionDurationSec must be a positive integer");
        }
        const sessionPassword = byId("sessionPassword").value;
        if (typeof sessionPassword !== "string" || sessionPassword.length < 8) {
          throw new Error("Session key password must be at least 8 characters");
        }
        if (allowedActions.length === 0) throw new Error("sessionAllowedActions cannot be empty");

        const walletChainIdHex = await window.ethereum.request({ method: "eth_chainId" });
        const walletChainId = Number.parseInt(walletChainIdHex, 16);
        if (walletChainId !== chainId) {
          throw new Error(`Wallet chainId ${walletChainId} does not match form chainId ${chainId}`);
        }

        const userOp = parseUserOp();
        if (userOp.sender.toLowerCase() !== account.toLowerCase()) {
          userOp.sender = account;
          byId("userOp").value = JSON.stringify(userOp, null, 2);
        }

        const sessionWallet = ethers.Wallet.createRandom();
        const sessionId = `sess_${Date.now()}_${randomHex(8)}`;
        const expiresAtUnix = Math.floor(Date.now() / 1000) + sessionDurationSec;

        const normalizedActions = normalizeActions(allowedActions);
        const grant = {
          sessionId,
          owner: account,
          sessionPublicKey: sessionWallet.signingKey.publicKey,
          chainId,
          allowedActions: normalizedActions,
          maxAmountUsdc,
          expiresAtUnix,
        };

        const grantTypedData = {
          types: {
            EIP712Domain: [
              { name: "name", type: "string" },
              { name: "version", type: "string" },
              { name: "chainId", type: "uint256" },
            ],
            ...sessionGrantTypes,
          },
          primaryType: "SessionGrant",
          domain: eip712Domain(chainId),
          message: {
            sessionId,
            owner: account,
            sessionPublicKey: sessionWallet.signingKey.publicKey,
            chainId: String(chainId),
            allowedActionsHash: hashAllowedActions(normalizedActions),
            maxAmountUsdc,
            expiresAtUnix: String(expiresAtUnix),
          },
        };
        const grantSignature = await window.ethereum.request({
          method: "eth_signTypedData_v4",
          params: [account, JSON.stringify(grantTypedData)],
        });

        const session = {
          ...grant,
          grantSignature,
          requestNonce: "",
          requestSignature: "0x",
        };

        const encrypted = await encryptPrivateKey(sessionWallet.privateKey, sessionPassword);
        await idbPut(storageKey(sessionId), encrypted);
        byId("session").value = JSON.stringify(session, null, 2);
      };

      const signPermit = async () => {
        const account = connectedAccount || (await connectWallet());
        const chainId = Number(byId("chainId").value);
        if (!Number.isInteger(chainId) || chainId <= 0) throw new Error("Invalid chainId");

        const walletChainIdHex = await window.ethereum.request({ method: "eth_chainId" });
        const walletChainId = Number.parseInt(walletChainIdHex, 16);
        if (walletChainId !== chainId) {
          throw new Error(`Wallet chainId ${walletChainId} does not match form chainId ${chainId}`);
        }

        const token = byId("permitToken").value.trim();
        const spender = byId("permitSpender").value.trim();
        const value = byId("amountUsdc").value.trim();
        const domainName = byId("permitDomainName").value.trim();
        const domainVersion = byId("permitDomainVersion").value.trim() || "1";
        let deadline = byId("permitDeadline").value.trim();

        if (!HEX_ADDRESS_REGEX.test(token)) throw new Error("Invalid permit token address");
        if (!HEX_ADDRESS_REGEX.test(spender)) throw new Error("Invalid permit spender address");
        if (!/^\d+$/.test(value) || BigInt(value) <= 0n) throw new Error("amountUsdc must be a positive numeric string");
        if (!domainName) throw new Error("Permit domain name is required");

        if (!deadline) {
          deadline = String(Math.floor(Date.now() / 1000) + 7 * 24 * 60 * 60);
          byId("permitDeadline").value = deadline;
        }
        if (!/^\d+$/.test(deadline)) throw new Error("Permit deadline must be unix seconds");

        const nonce = await readPermitNonce(token, account);

        const typedData = {
          types: {
            EIP712Domain: [
              { name: "name", type: "string" },
              { name: "version", type: "string" },
              { name: "chainId", type: "uint256" },
              { name: "verifyingContract", type: "address" },
            ],
            Permit: [
              { name: "owner", type: "address" },
              { name: "spender", type: "address" },
              { name: "value", type: "uint256" },
              { name: "nonce", type: "uint256" },
              { name: "deadline", type: "uint256" },
            ],
          },
          primaryType: "Permit",
          domain: {
            name: domainName,
            version: domainVersion,
            chainId,
            verifyingContract: token,
          },
          message: {
            owner: account,
            spender,
            value,
            nonce,
            deadline,
          },
        };

        const signature = await window.ethereum.request({
          method: "eth_signTypedData_v4",
          params: [account, JSON.stringify(typedData)],
        });

        const permit = {
          token,
          owner: account,
          spender,
          value,
          nonce,
          deadline,
          signature,
          domainName,
          domainVersion,
        };
        byId("permit").value = JSON.stringify(permit, null, 2);
      };

      byId("connectBtn").addEventListener("click", async () => {
        try {
          await connectWallet();
        } catch (err) {
          output.textContent = `Connect failed: ${err instanceof Error ? err.message : String(err)}`;
        }
      });

      byId("createSessionBtn").addEventListener("click", async () => {
        try {
          output.textContent = "Creating session key...";
          await createSession();
          output.textContent = "Session created and saved locally. You can now request sponsorship without extra wallet prompts.";
        } catch (err) {
          output.textContent = `Create session failed: ${err instanceof Error ? err.message : String(err)}`;
        }
      });

      byId("signPermitBtn").addEventListener("click", async () => {
        try {
          output.textContent = "Signing permit...";
          await signPermit();
          output.textContent = "Permit signed. You can now request sponsorship.";
        } catch (err) {
          output.textContent = `Sign permit failed: ${err instanceof Error ? err.message : String(err)}`;
        }
      });

      byId("revokeSessionBtn").addEventListener("click", async () => {
        output.textContent = "Revoking session...";
        try {
          const session = JSON.parse(byId("session").value);
          const account = connectedAccount || (await connectWallet());
          if (!session?.sessionId || !session?.owner) {
            throw new Error("Session JSON missing sessionId/owner");
          }
          if (session.owner.toLowerCase() !== account.toLowerCase()) {
            throw new Error("Connected wallet must match session owner");
          }

          if (!Number.isInteger(session.chainId) || session.chainId <= 0) {
            throw new Error("Session JSON has invalid chainId");
          }
          const revokeTypedData = {
            types: {
              EIP712Domain: [
                { name: "name", type: "string" },
                { name: "version", type: "string" },
                { name: "chainId", type: "uint256" },
              ],
              ...sessionRevokeTypes,
            },
            primaryType: "SessionRevoke",
            domain: eip712Domain(session.chainId),
            message: {
              sessionId: session.sessionId,
              owner: session.owner,
              chainId: String(session.chainId),
            },
          };
          const revokeSignature = await window.ethereum.request({
            method: "eth_signTypedData_v4",
            params: [account, JSON.stringify(revokeTypedData)],
          });

          const requestId = `revoke_${Date.now()}_${randomHex(4)}`;
          const res = await fetch("/api/session/revoke", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              requestId,
              creRevokeTriggerUrl: byId("creRevokeTriggerUrl").value.trim(),
              sessionId: session.sessionId,
              owner: session.owner,
              chainId: Number(session.chainId),
              revokeSignature,
            }),
          });
          const data = await res.json();
          if (res.ok && data?.revoked) {
            await idbDelete(storageKey(session.sessionId));
          }
          output.textContent = JSON.stringify({ status: res.status, ...data }, null, 2);
        } catch (err) {
          output.textContent = `Revoke failed: ${err instanceof Error ? err.message : String(err)}`;
        }
      });

      byId("sendBtn").addEventListener("click", async () => {
        output.textContent = "Requesting...";
        try {
          const session = JSON.parse(byId("session").value);
          const permit = JSON.parse(byId("permit").value);
          const userOp = parseUserOp();
          const requestId = `ui_${Date.now()}_${randomHex(4)}`;

          if (!session?.sessionId || !session?.grantSignature) {
            throw new Error("Session JSON missing required fields");
          }
          if (!permit?.signature || permit.signature === "0x") {
            throw new Error("Permit is missing signature; click Sign Permit");
          }
          const sessionPassword = byId("sessionPassword").value;
          if (typeof sessionPassword !== "string" || sessionPassword.length < 8) {
            throw new Error("Enter your session key password (min 8 chars)");
          }
          const chainId = Number(byId("chainId").value);
          if (!Number.isInteger(chainId) || chainId <= 0) throw new Error("Invalid chainId");
          if (Number(session.chainId) !== chainId) {
            throw new Error("Form chainId must match session.chainId");
          }
          const slippageBps = Number(byId("slippageBps").value);
          if (!Number.isInteger(slippageBps) || slippageBps < 0) {
            throw new Error("slippageBps must be a non-negative integer");
          }

          const encrypted = await idbGet(storageKey(session.sessionId));
          if (!encrypted) throw new Error("Session private key missing locally; create session again");
          const sessionPrivateKey = await decryptPrivateKey(encrypted, sessionPassword);
          const sessionWallet = new ethers.Wallet(sessionPrivateKey);

          const requestNonce = randomNonce();
          if (!NONCE_REGEX.test(requestNonce)) throw new Error("generated nonce format invalid");

          const intentMessage = {
            requestId,
            sessionId: session.sessionId,
            requestNonce,
            chainId,
            action: byId("action").value.trim(),
            amountUsdc: byId("amountUsdc").value.trim(),
            slippageBps,
            sender: userOp.sender,
            callData: userOp.callData,
          };
          const requestSignature = await sessionWallet.signTypedData(
            eip712Domain(chainId),
            sponsorIntentTypes,
            intentMessage
          );

          const signedSession = {
            ...session,
            requestNonce,
            requestSignature,
          };
          byId("session").value = JSON.stringify(signedSession, null, 2);

          const payload = {
            requestId,
            creTriggerUrl: byId("creTriggerUrl").value.trim(),
            creExecuteTriggerUrl: byId("creExecuteTriggerUrl").value.trim(),
            chainId,
            action: byId("action").value.trim(),
            amountUsdc: byId("amountUsdc").value.trim(),
            slippageBps,
            reportActionType: byId("reportActionType").value.trim(),
            reportPayloadHex: byId("reportPayloadHex").value.trim(),
            reportReceiver: byId("reportReceiver").value.trim() || undefined,
            session: signedSession,
            permit,
            userOp,
          };

          const res = await fetch("/api/sponsor", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          output.textContent = JSON.stringify({ status: res.status, ...data }, null, 2);
        } catch (err) {
          output.textContent = `Request failed: ${err instanceof Error ? err.message : String(err)}`;
        }
      });
    </script>
  </body>
</html>
